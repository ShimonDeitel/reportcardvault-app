name: ReportCardVault
options:
  bundleIdPrefix: com.shimondeitel.reportcardvault
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ReportCardVault:
    type: application
    platform: iOS
    sources:
      - path: ReportCardVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.reportcardvault
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ReportCardVault/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ReportCardVaultTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ReportCardVaultTests
      - path: ReportCardVault.storekit
    dependencies:
      - target: ReportCardVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.reportcardvault.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ReportCardVaultUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ReportCardVaultUITests
    dependencies:
      - target: ReportCardVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.reportcardvault.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ReportCardVault:
    build:
      targets:
        ReportCardVault: all
        ReportCardVaultTests: [test]
        ReportCardVaultUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ReportCardVault.storekit
    test:
      config: Debug
      storeKitConfiguration: ReportCardVault.storekit
      targets:
        - ReportCardVaultTests
        - ReportCardVaultUITests
    archive:
      config: Release
